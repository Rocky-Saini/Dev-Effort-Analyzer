<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — DevEffort</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand">⚡ DevEffort</a>
      <div class="nav-links" id="navLinks">
        <a href="/" class="nav-link">Home</a>
        <a href="/about.html" class="nav-link">About</a>
        <a href="/contact.html" class="nav-link active">Contact</a>
        <a href="/terms.html" class="nav-link">Terms</a>
      </div>
      <button class="nav-toggle" onclick="toggleNav()">☰</button>
    </div>
  </nav>

  <section class="page-section">
    <div class="container">
      <h1 class="page-title">Contact Us</h1>

      <div class="contact-grid">
        <div class="contact-card">
          <div class="contact-icon">👤</div>
          <h3>Rocky Saini</h3>
          <p class="contact-role">CEO & Founder</p>
        </div>
        <div class="contact-card">
          <div class="contact-icon">📧</div>
          <h3>Email</h3>
          <a href="mailto:rocky.saini@tothenew.com" class="contact-link">rocky.saini@tothenew.com</a>
        </div>
        <div class="contact-card">
          <div class="contact-icon">📱</div>
          <h3>Phone</h3>
          <a href="tel:+919027437997" class="contact-link">+91 9027437997</a>
        </div>
      </div>

      <div class="contact-message">
        <h2>Send a Message</h2>
        <form onsubmit="sendMessage(event)">
          <div class="form-grid-2">
            <div class="form-field">
              <label>Your Name</label>
              <input type="text" placeholder="John Doe" required />
            </div>
            <div class="form-field">
              <label>Your Email</label>
              <input type="email" placeholder="john@example.com" required />
            </div>
          </div>
          <div class="form-field">
            <label>Message</label>
            <textarea rows="5" placeholder="How can we help you?" required></textarea>
          </div>
          <button type="submit" class="btn-accent" style="width:100%;padding:1rem;margin-top:0.5rem;">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand"><span>⚡ DevEffort</span><p>AI-Powered Development Effort Analyzer</p></div>
      <div class="footer-links"><a href="/about.html">About</a><a href="/contact.html">Contact</a><a href="/terms.html">Terms</a></div>
      <div class="footer-copy">&copy; 2025 DevEffort. Built by Rocky Saini.</div>
    </div>
  </footer>
  <script src="app.js"></script>
  <script>
    function sendMessage(e) {
      e.preventDefault();
      alert('Message sent! We will get back to you soon.');
      e.target.reset();
    }
  </script>
</body>
</html>
